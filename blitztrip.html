<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BlitzTrip — AI Travel Planner</title>
  <style>
    :root {
      --primary: #0066cc;
      --primary-focus: #0071e3;
      --primary-on-dark: #2997ff;
      --ink: #1d1d1f;
      --body: #1d1d1f;
      --body-on-dark: #ffffff;
      --body-muted: #cccccc;
      --ink-muted-80: #333333;
      --ink-muted-48: #7a7a7a;
      --divider-soft: #f0f0f0;
      --hairline: #e0e0e0;
      --canvas: #ffffff;
      --canvas-parchment: #f5f5f7;
      --surface-pearl: #fafafc;
      --surface-tile-1: #272729;
      --surface-black: #000000;
      --on-primary: #ffffff;
      --live-event-red: #ff3b30;
      --transport-green: #34c759;
      --rounded-lg: 18px;
      --rounded-pill: 9999px;
      --xs: 8px; --sm: 12px; --md: 17px; --lg: 24px; --xl: 32px; --xxl: 48px; --section: 80px;
      --font-display: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", sans-serif;
      --font-text: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font-text);
      font-size: 17px;
      font-weight: 400;
      line-height: 1.47;
      letter-spacing: -0.374px;
      color: var(--body);
      background: var(--canvas-parchment);
      min-height: 100vh;
    }
    h1, h2, h3 {
      font-family: var(--font-display);
      font-weight: 600;
      line-height: 1.1;
      letter-spacing: 0;
      color: var(--ink);
    }
    h1 { font-size: 40px; }
    h2 { font-size: 28px; }
    h3 { font-size: 21px; font-weight: 600; }
    .tagline { font-size: 21px; font-weight: 600; color: var(--ink-muted-48); }
    .caption { font-size: 14px; color: var(--ink-muted-48); }
    .app-shell { max-width: 1200px; margin: 0 auto; padding: 0 var(--lg); }
    .hidden { display: none !important; }
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: var(--xs);
      min-height: 44px; min-width: 44px; padding: 0 var(--xl);
      border: none; border-radius: var(--rounded-pill);
      font-family: var(--font-text); font-size: 17px; font-weight: 500;
      cursor: pointer; transition: opacity 0.2s, background 0.2s;
    }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-primary { background: var(--primary-focus); color: var(--on-primary); }
    .btn-primary:hover:not(:disabled) { background: var(--primary); }
    .btn-secondary { background: var(--canvas); color: var(--ink); border: 1px solid var(--hairline); }
    .btn-secondary:hover:not(:disabled) { background: var(--surface-pearl); }
    .btn-ghost { background: transparent; color: var(--primary-focus); padding: 0 var(--md); }
    .card {
      background: var(--canvas); border-radius: var(--rounded-lg);
      border: 1px solid var(--hairline); padding: var(--lg);
    }
    .input, .select-field {
      width: 100%; min-height: 44px; padding: var(--sm) var(--md);
      border: 1px solid var(--hairline); border-radius: 12px;
      font-family: var(--font-text); font-size: 17px; background: var(--canvas);
    }
    .input:focus, .select-field:focus { outline: 2px solid var(--primary-focus); outline-offset: 0; border-color: transparent; }
    .field-label { display: block; font-size: 14px; color: var(--ink-muted-48); margin-bottom: var(--xs); }
    .field-group { margin-bottom: var(--lg); }
    .error-msg { color: var(--live-event-red); font-size: 14px; margin-top: var(--xs); }
    .banner-offline {
      background: #fff8e6; border: 1px solid #ffd60a; border-radius: var(--rounded-lg);
      padding: var(--md) var(--lg); margin-bottom: var(--lg); font-size: 14px;
    }

    /* Cover */
    #cover-view {
      min-height: 100vh; display: flex; flex-direction: column;
      background: var(--canvas);
      color: var(--ink);
    }
    .cover-hero {
      flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center; padding: var(--section) var(--lg);
    }
    .cover-logo {
      font-family: var(--font-display); font-size: 56px; font-weight: 600;
      letter-spacing: -1px; margin-bottom: var(--md); color: var(--ink);
    }
    .cover-logo span { color: var(--primary-focus); }
    .cover-sub {
      font-size: 21px; font-weight: 600; color: var(--ink-muted-48);
      max-width: 480px; margin-bottom: var(--xxl); line-height: 1.4;
    }
    .cover-features {
      display: flex; flex-wrap: wrap; gap: var(--sm); justify-content: center;
      margin-bottom: var(--xxl); max-width: 640px;
    }
    .cover-pill {
      padding: var(--sm) var(--lg); border-radius: var(--rounded-pill);
      border: 1px solid var(--hairline); font-size: 14px; color: var(--ink-muted-80);
      background: var(--surface-pearl);
    }
    .cover-cta { margin-top: var(--md); padding: 0 var(--xxl); min-height: 48px; font-size: 18px; }
    .cover-footer {
      padding: var(--lg); text-align: center; font-size: 14px; color: var(--ink-muted-48);
      border-top: 1px solid var(--divider-soft);
      background: var(--canvas-parchment);
    }
    .locale-bar {
      position: fixed; top: var(--md); right: var(--md); z-index: 200;
      display: flex; gap: var(--sm); align-items: center;
      padding: var(--xs); border-radius: var(--rounded-pill);
      background: var(--canvas); border: 1px solid var(--hairline);
    }
    .locale-bar .select-field { width: auto; min-width: 88px; padding: var(--xs) var(--sm); font-size: 14px; min-height: 36px; }
    .slot-card.meal-slot { border-left: 4px solid #ff9500; }

    /* Wizard */
    #wizard-view { padding: var(--xl) 0 var(--xxl); }
    .wizard-header { text-align: center; margin-bottom: var(--xxl); }
    .step-indicator {
      display: flex; justify-content: center; gap: var(--sm); margin-top: var(--lg);
    }
    .step-dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: var(--hairline); transition: background 0.2s, transform 0.2s;
    }
    .step-dot.active { background: var(--primary-focus); transform: scale(1.2); }
    .step-dot.done { background: var(--transport-green); }
    .wizard-card { max-width: 640px; margin: 0 auto; }
    .wizard-nav {
      display: flex; justify-content: space-between; gap: var(--md);
      margin-top: var(--xl); padding-top: var(--lg); border-top: 1px solid var(--divider-soft);
    }
    .chip-grid { display: flex; flex-wrap: wrap; gap: var(--sm); margin-top: var(--md); }
    .chip {
      padding: var(--xs) var(--md); border-radius: var(--rounded-pill);
      border: 1px solid var(--hairline); background: var(--canvas);
      font-size: 14px; cursor: pointer; min-height: 36px;
      transition: border-color 0.15s, background 0.15s;
    }
    .chip:hover { border-color: var(--primary-focus); }
    .chip.selected { background: var(--primary-focus); color: var(--on-primary); border-color: var(--primary-focus); }
    .interest-chip.selected { background: var(--primary-focus); color: var(--on-primary); }
    .search-results {
      margin-top: var(--sm); border: 1px solid var(--hairline);
      border-radius: var(--rounded-lg); background: var(--canvas); max-height: 280px; overflow-y: auto;
    }
    .search-result-item {
      padding: var(--md); cursor: pointer; border-bottom: 1px solid var(--divider-soft);
      display: flex; justify-content: space-between; align-items: center;
    }
    .search-result-item:last-child { border-bottom: none; }
    .search-result-item:hover { background: var(--surface-pearl); }
    .search-result-item.selected { background: #e8f4ff; }
    .selected-dest {
      margin-top: var(--md); padding: var(--md); background: #e8f4ff;
      border-radius: 12px; display: flex; align-items: center; gap: var(--sm);
    }
    .intensity-cards { display: grid; gap: var(--md); margin-top: var(--md); }
    .intensity-card {
      padding: var(--lg); border: 2px solid var(--hairline); border-radius: var(--rounded-lg);
      cursor: pointer; transition: border-color 0.15s;
    }
    .intensity-card:hover { border-color: var(--primary-focus); }
    .intensity-card.selected { border-color: var(--primary-focus); background: #f0f7ff; }
    .intensity-card h4 { font-size: 17px; margin-bottom: var(--xs); }
    .intensity-card p { font-size: 14px; color: var(--ink-muted-48); }
    .traveler-row { display: flex; align-items: center; gap: var(--md); }
    .traveler-btn {
      width: 44px; height: 44px; border-radius: 50%; border: 1px solid var(--hairline);
      background: var(--canvas); font-size: 20px; cursor: pointer;
    }
    .date-row { display: grid; grid-template-columns: 1fr 1fr; gap: var(--md); }
    @media (max-width: 640px) {
      .date-row { grid-template-columns: 1fr; }
      h1 { font-size: 32px; }
      .cover-logo { font-size: 40px; }
    }

    /* Loading */
    #loading-view {
      min-height: 60vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; text-align: center; padding: var(--xxl);
    }
    .spinner {
      width: 48px; height: 48px; border: 3px solid var(--hairline);
      border-top-color: var(--primary-focus); border-radius: 50%;
      animation: spin 0.8s linear infinite; margin-bottom: var(--lg);
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Results */
    #results-view { padding: var(--xl) 0 120px; }
    .results-header { margin-bottom: var(--xl); }
    .day-tabs {
      display: flex; gap: var(--sm); overflow-x: auto; padding-bottom: var(--sm);
      margin-bottom: var(--lg); -webkit-overflow-scrolling: touch;
    }
    .day-tab {
      flex-shrink: 0; padding: var(--sm) var(--lg); border-radius: var(--rounded-pill);
      border: 1px solid var(--hairline); background: var(--canvas); cursor: pointer; font-size: 14px;
    }
    .day-tab.active { background: var(--primary-focus); color: var(--on-primary); border-color: var(--primary-focus); }
    .slot-card { margin-bottom: var(--md); }
    .slot-header { display: flex; gap: var(--md); align-items: flex-start; }
    .slot-time { font-weight: 600; color: var(--primary-focus); min-width: 52px; }
    .slot-place { font-weight: 600; font-size: 17px; }
    .slot-meta { font-size: 14px; color: var(--ink-muted-48); margin-top: 4px; }
    .slot-tip { font-size: 14px; color: var(--ink-muted-80); margin-top: var(--xs); font-style: italic; }
    .transport-card {
      margin: var(--sm) 0 var(--md) 52px; padding: var(--md);
      background: var(--surface-pearl); border-radius: 12px;
      border-left: 3px solid var(--transport-green); font-size: 14px;
    }
    .transport-mode { font-weight: 600; color: var(--transport-green); }
    .transport-summary {
      margin-top: var(--lg); padding: var(--lg); background: var(--surface-pearl);
      border-radius: var(--rounded-lg);
    }
    .budget-module { margin-top: var(--section); }
    .budget-module h2 { margin-bottom: var(--lg); }
    .budget-module h3 { font-size: 17px; margin-bottom: var(--md); }
    .budget-fixed-row {
      display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between;
      gap: var(--sm); padding: var(--md) 0; border-bottom: 1px solid var(--divider-soft);
    }
    .budget-fixed-row:last-child { border-bottom: none; }
    .budget-tag { font-size: 12px; padding: 2px 8px; border-radius: var(--rounded-pill); background: var(--surface-pearl); }
    .budget-tag.confirmed { background: #e8f8ee; color: #1a7f37; }
    .budget-tag.estimate { background: #fff8e6; color: #996600; }
    .budget-slot-row {
      display: flex; flex-wrap: wrap; gap: var(--sm) var(--md); align-items: baseline;
      padding: var(--xs) 0; font-size: 14px; border-bottom: 1px solid var(--divider-soft);
    }
    .budget-slot-row:last-child { border-bottom: none; }
    .budget-day-block { margin-bottom: var(--lg); }
    .budget-day-total { font-weight: 600; margin-top: var(--sm); font-size: 14px; }
    .budget-estimate-row { padding: var(--md) 0; border-top: 1px solid var(--hairline); font-size: 14px; }
    .budget-s2-subtotal { font-weight: 600; font-size: 17px; margin-top: var(--lg); padding-top: var(--md); border-top: 2px solid var(--hairline); }
    .budget-grand {
      margin-top: var(--xl); padding: var(--xl); background: var(--ink);
      color: var(--body-on-dark); border-radius: var(--rounded-lg); text-align: center;
    }
    .budget-grand .grand-amount { font-size: 36px; font-weight: 600; margin: var(--md) 0; }
    .budget-over-banner {
      margin-top: var(--md); padding: var(--md); background: #fff0f0; border: 1px solid var(--live-event-red);
      border-radius: var(--rounded-lg); color: var(--live-event-red); font-size: 14px;
    }
    .budget-actions { display: flex; flex-wrap: wrap; gap: var(--sm); margin-top: var(--lg); }
    .live-slot-badge { color: var(--live-event-red); font-size: 11px; font-weight: 700; }
    .action-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: rgba(255,255,255,0.92); backdrop-filter: blur(12px);
      border-top: 1px solid var(--hairline); padding: var(--md) var(--lg);
      display: flex; gap: var(--sm); justify-content: center; flex-wrap: wrap; z-index: 100;
    }
    @media print {
      .action-bar, #cover-view, #wizard-view, #loading-view, .day-tabs { display: none !important; }
      body { background: white; }
      .day-panel { display: block !important; }
    }
  </style>
</head>
<body>

<div class="locale-bar" id="locale-bar">
  <select class="select-field" id="lang-select" aria-label="Language">
    <option value="zh">中文</option>
    <option value="en">English</option>
  </select>
  <select class="select-field" id="currency-select" aria-label="Currency">
    <option value="HKD">HKD</option>
    <option value="USD">USD</option>
    <option value="EUR">EUR</option>
    <option value="GBP">GBP</option>
    <option value="JPY">JPY</option>
    <option value="CNY">CNY</option>
    <option value="SGD">SGD</option>
    <option value="AUD">AUD</option>
    <option value="THB">THB</option>
  </select>
</div>

<!-- COVER PAGE -->
<section id="cover-view">
  <div class="cover-hero">
    <div class="cover-logo">Blitz<span>Trip</span></div>
    <p class="cover-sub" data-i18n="cover_sub">AI 驱动的极速旅行规划 · 分钟级行程 · 智能交通路线</p>
    <div class="cover-features">
      <span class="cover-pill" data-i18n="pill_global">🌍 全球目的地</span>
      <span class="cover-pill" data-i18n="pill_transport">🚇 交通路线</span>
      <span class="cover-pill" data-i18n="pill_meals">🍽 午餐晚餐</span>
      <span class="cover-pill" data-i18n="pill_budget">💰 预算分析</span>
    </div>
    <button type="button" class="btn btn-primary cover-cta" id="btn-start" data-i18n="btn_start">开始规划行程</button>
  </div>
  <footer class="cover-footer" data-i18n="cover_footer">BlitzTrip · 单文件旅行规划器 · 无需安装</footer>
</section>

<!-- WIZARD -->
<section id="wizard-view" class="hidden">
  <div class="app-shell">
    <header class="wizard-header">
      <h1>规划你的旅程</h1>
      <p class="tagline">4 步完成 · 智能生成专属行程</p>
      <div class="step-indicator" id="step-indicator">
        <span class="step-dot active" data-step="1"></span>
        <span class="step-dot" data-step="2"></span>
        <span class="step-dot" data-step="3"></span>
        <span class="step-dot" data-step="4"></span>
      </div>
    </header>
    <div class="wizard-card card">
      <!-- Step 1 -->
      <div id="step-1" class="wizard-step">
        <h3>日期与人数</h3>
        <div class="field-group date-row">
          <div><label class="field-label">出发日期</label>
          <input type="date" class="input" id="start-date" /></div>
          <div><label class="field-label">返回日期</label>
          <input type="date" class="input" id="end-date" /></div>
        </div>
        <p class="caption" id="duration-label">行程天数：—</p>
        <p class="error-msg hidden" id="err-dates"></p>
        <div class="field-group">
          <label class="field-label">出行人数</label>
          <div class="traveler-row">
            <button type="button" class="traveler-btn" id="travelers-minus">−</button>
            <span id="travelers-count" style="font-size:24px;font-weight:600;min-width:32px;text-align:center">2</span>
            <button type="button" class="traveler-btn" id="travelers-plus">+</button>
          </div>
        </div>
      </div>

      <!-- Step 2 -->
      <div id="step-2" class="wizard-step hidden">
        <h3>选择目的地</h3>
        <p class="caption" style="margin-bottom:var(--md)">搜索全球任意城市（支持中英文）</p>
        <div class="field-group">
          <input type="search" class="input" id="city-search" placeholder="输入城市名，如 Paris、东京、Reykjavik…" autocomplete="off" />
          <div class="search-results hidden" id="search-results"></div>
        </div>
        <div class="selected-dest hidden" id="selected-dest">
          <span>✓</span>
          <div><strong id="dest-name"></strong><br><span class="caption" id="dest-meta"></span></div>
          <button type="button" class="btn btn-ghost" id="clear-dest" style="margin-left:auto">清除</button>
        </div>
        <p class="error-msg hidden" id="err-dest">请搜索并选择一个目的地</p>
        <p class="field-label" style="margin-top:var(--lg)">热门目的地</p>
        <div class="chip-grid" id="hot-destinations"></div>
      </div>

      <!-- Step 3 -->
      <div id="step-3" class="wizard-step hidden">
        <h3>旅行偏好</h3>
        <p class="field-label">兴趣（至少选 1 项）</p>
        <div class="chip-grid" id="interest-chips"></div>
        <p class="error-msg hidden" id="err-interests">请至少选择一项兴趣</p>
        <div class="field-group" style="margin-top:var(--xl)">
          <label class="field-label" for="dietary" id="label-dietary">饮食限制</label>
          <select class="select-field" id="dietary">
            <option value="none">无限制</option>
            <option value="vegetarian">素食</option>
            <option value="halal">清真</option>
            <option value="no-seafood">不吃海鲜</option>
          </select>
        </div>
        <div class="field-group">
          <label class="field-label" for="budget-tier" id="label-budget">预算档次</label>
          <select class="select-field" id="budget-tier">
            <option value="economy">经济 · HKD 200–500/天</option>
            <option value="comfort" selected>舒适 · HKD 500–1000/天</option>
            <option value="luxury">奢华 · HKD 1000+/天</option>
          </select>
        </div>
      </div>

      <!-- Step 4 -->
      <div id="step-4" class="wizard-step hidden">
        <h3>行程强度</h3>
        <p class="caption" style="margin-bottom:var(--md)">决定每天的活动数量</p>
        <div class="intensity-cards" id="intensity-cards"></div>
      </div>

      <nav class="wizard-nav">
        <button type="button" class="btn btn-secondary" id="btn-back" disabled>返回</button>
        <button type="button" class="btn btn-primary" id="btn-next">下一步</button>
      </nav>
    </div>
  </div>
</section>

<!-- LOADING -->
<section id="loading-view" class="hidden">
  <div class="spinner"></div>
  <h2 data-i18n="loading_title">🧠 AI 正在打造你的行程…</h2>
  <p class="caption" style="margin-top:var(--md)" id="loading-sub" data-i18n="loading_sub">规划景点、午餐晚餐、交通与本地活动</p>
</section>

<!-- RESULTS -->
<section id="results-view" class="hidden">
  <div class="app-shell">
    <div id="offline-banner" class="banner-offline hidden"></div>
    <div id="ai-banner" class="banner-offline hidden" style="background:#e8f4ff;border-color:#0071e3"></div>
    <header class="results-header">
      <button type="button" class="btn btn-ghost" id="btn-back-cover" style="padding-left:0;margin-bottom:var(--md)">← 封面</button>
      <h1 id="results-title">你的行程</h1>
      <p class="tagline" id="results-subtitle"></p>
    </header>
    <div id="day-panels"></div>
    <div class="transport-summary card" id="transport-summary-all"></div>
        <section id="budget-section" class="budget-module">
      <div id="budget-s1-form" class="card"></div>
      <div id="budget-s1-results" class="card hidden" style="margin-top:var(--lg)"></div>
      <div id="budget-s2" class="card" style="margin-top:var(--lg)"></div>
      <div id="budget-grand" class="budget-grand hidden"></div>
    </section>
  </div>
</section>

<div class="action-bar hidden" id="action-bar">
  <button type="button" class="btn btn-secondary" id="btn-new-trip">← 新行程</button>
  <button type="button" class="btn btn-secondary" id="btn-regenerate">🔄 重新生成</button>
  <button type="button" class="btn btn-primary" id="btn-export">🖨️ 导出打印</button>
</div>

<script>
(function () {
  'use strict';

  const DEFAULT_API_KEY = 'sk-be52ac502a594d5282b42e34bb7accca';
  const SERPAPI_KEY = 'YOUR_SERPAPI_KEY';
  const API_TIMEOUT_MS = 45000;
  const BUDGET_PER_DAY_TIER = { economy: 350, comfort: 750, luxury: 1500 };
  const IATA_MAP = {
    tokyo: 'NRT', osaka: 'KIX', seoul: 'ICN', bangkok: 'BKK', singapore: 'SIN',
    paris: 'CDG', london: 'LHR', 'new york': 'JFK', barcelona: 'BCN', sydney: 'SYD',

  function fmtMoney(hkd) {
    const c = CURRENCIES[appCurrency] || CURRENCIES.HKD;
    const amount = appCurrency === 'JPY' ? Math.round(hkd * c.rate) : Math.round(hkd * c.rate * 10) / 10;
    return `~${c.symbol} ${amount}`;
  }

  function roundToNearest10(v) { return Math.round(v / 10) * 10; }

  function convertHKDToDisplay(v, currency) {
    const cur = currency === 'USD' ? 'USD' : 'HKD';
    return cur === 'USD' ? Math.round(v / 7.8) : Math.round(v);
  }

  function fmtBudget(hkd) {
    const cur = budgetDisplayCurrency === 'USD' ? 'USD' : 'HKD';
    const amt = convertHKDToDisplay(hkd, cur);
    return `~${cur === 'USD' ? 'US$' : 'HK$'} ${amt.toLocaleString()}`;
  }

  function getTripParams() {
    if (!tripConfig) return null;
    const numDays = Math.max(1, tripConfig.durationDays || 1);
    const cur = (budgetDisplayCurrency === 'USD' || budgetDisplayCurrency === 'HKD')
      ? budgetDisplayCurrency
      : (appCurrency === 'USD' ? 'USD' : 'HKD');
    return {
      numDays,
      city: tripConfig.destination?.name || '',
      intensity: tripConfig.intensityMode || 'standard',
      budgetPerDay: BUDGET_PER_DAY_TIER[tripConfig.budgetTier] || null,
      currency: cur,
      startDate: tripConfig.startDate,
      endDate: tripConfig.endDate,
      travelers: tripConfig.travelers || 1
    };
  }

  function resolveCityKey(city) {
    const k = (city || '').toLowerCase().split(',')[0].trim();
    if (IATA_MAP[k]) return k;
    for (const key of Object.keys(IATA_MAP)) {
      if (k.includes(key) || key.includes(k)) return key;
    }
    return k;
  }

  function getIATA(city) {
    const key = resolveCityKey(city);
    return IATA_MAP[key] || 'NRT';
  }

  function tripComFlightUrl(iata, start, end) {
    return `https://www.trip.com/flights/search?departCity=HKG&arriveCity=${encodeURIComponent(iata)}&departDate=${start}&returnDate=${end}&cabinClass=economy&adult=1`;
  }

  function tripComHotelUrl(city, start, end) {
    return `https://www.trip.com/hotels/list?city=${encodeURIComponent(city)}&startDate=${start}&endDate=${end}&curr=HKD`;
  }

  async function fetchSerpFlights(iata, start, end) {
    if (!SERPAPI_KEY || SERPAPI_KEY === 'YOUR_SERPAPI_KEY') return null;
    try {
      const url = `https://serpapi.com/search.json?engine=google_flights&departure_id=HKG&arrival_id=${iata}&outbound_date=${start}&return_date=${end}&currency=HKD&hl=en&api_key=${SERPAPI_KEY}`;
      const res = await fetch(url);
      if (!res.ok) return null;
      const data = await res.json();
      const price = data.best_flights?.[0]?.price ?? data.best_flights?.[0]?.flights?.[0]?.price;
      return typeof price === 'number' ? price : null;
    } catch (_) { return null; }
  }

  async function fetchSerpHotels(city, start, end) {
    if (!SERPAPI_KEY || SERPAPI_KEY === 'YOUR_SERPAPI_KEY') return null;
    try {
      const url = `https://serpapi.com/search.json?engine=google_hotels&q=${encodeURIComponent(city + ' hotels')}&check_in_date=${start}&check_out_date=${end}&currency=HKD&hl=en&api_key=${SERPAPI_KEY}`;
      const res = await fetch(url);
      if (!res.ok) return null;
      const data = await res.json();
      const rate = data.properties?.[0]?.rate_per_night?.lowest;
      return typeof rate === 'number' ? rate : null;
    } catch (_) { return null; }
  }

        });
      }
      if (d.appLang) { appLang = d.appLang; $('lang-select').value = appLang; }
      if (d.appCurrency) { appCurrency = d.appCurrency; $('currency-select').value = appCurrency; }
      if (d.currentStep) goToStep(d.currentStep, false);
      updateDuration();
      applyI18n();
    } catch (_) {}
  }

  function parseDates() {
    const start = $('start-date').value;
    const end = $('end-date').value;
    if (!start || !end) return { valid: false, days: 0 };
    const s = new Date(start);
    const e = new Date(end);
    const diff = Math.round((e - s) / 86400000) + 1;
    return { valid: e >= s && diff >= 1, days: Math.max(1, diff), start, end };
  }

  function updateDuration() {
    const { valid, days, start, end } = parseDates();
    const err = $('err-dates');
    if (!start || !end) {
      $('duration-label').textContent = t('duration') + '：—';
      err.classList.add('hidden');
      return;
    }
    if (!valid) {
      $('duration-label').textContent = t('duration_invalid');
      err.textContent = t('err_dates');
      err.classList.remove('hidden');
    } else {
      $('duration-label').textContent = t('duration_days', { n: days });
      err.classList.add('hidden');
    }
  }

  function validateStep(step) {
    if (step === 1) {
      const { valid } = parseDates();
      if (!valid) {
        $('err-dates').classList.remove('hidden');
        return false;
      }
      return true;
    }
    if (step === 2) {
      if (!selectedDestination) {
        $('err-dest').classList.remove('hidden');
        return false;
      }
      $('err-dest').classList.add('hidden');
      return true;
    }
    if (step === 3) {
      if (selectedInterests.size < 1) {
        $('err-interests').classList.remove('hidden');
        return false;
      }
      $('err-interests').classList.add('hidden');
      return true;
    }
    return true;
  }

  function updateStepUI() {
    document.querySelectorAll('.wizard-step').forEach((el, i) => {
      el.classList.toggle('hidden', i + 1 !== currentStep);
    });
    document.querySelectorAll('.step-dot').forEach((dot) => {
      const n = +dot.dataset.step;
      dot.classList.toggle('active', n === currentStep);
      dot.classList.toggle('done', n < currentStep);
    });
    $('btn-back').disabled = currentStep === 1;
    $('btn-next').textContent = currentStep === 4 ? t('btn_generate') : t('btn_next');
    saveDraft();
  }

  function goToStep(n, validate = true) {
    if (validate && n > currentStep && !validateStep(currentStep)) return;
    currentStep = Math.max(1, Math.min(4, n));
    updateStepUI();
  }

  function setDestination(dest) {
    selectedDestination = dest;
    $('dest-name').textContent = dest.name + (dest.nameZh ? ` (${dest.nameZh})` : '');
    $('dest-meta').textContent = [dest.country, dest.code].filter(Boolean).join(' · ');
    $('selected-dest').classList.remove('hidden');
    $('err-dest').classList.add('hidden');
    document.querySelectorAll('.chip[data-city]').forEach((c) => {
      c.classList.toggle('selected', c.dataset.city === dest.name);
    });
    saveDraft();
  }

  async function searchCities(query) {
    const box = $('search-results');
    if (!query || query.length < 2) {
      box.classList.add('hidden');
      return;
    }
    box.innerHTML = `<div class="search-result-item"><span class="caption">${t('searching')}</span></div>`;
    box.classList.remove('hidden');
    try {
      const url = `https://photon.komoot.io/api/?q=${encodeURIComponent(query)}&limit=15&lang=en`;
      const res = await fetch(url);
      const data = await res.json();
      const cities = (data.features || [])
        .filter((f) => {
          const p = f.properties || {};
          const t = p.type;
          return t === 'city' || t === 'town' || t === 'municipality' || t === 'locality' || t === 'district';
        })
        .map((f) => {
          const p = f.properties || {};
          const name = p.name || p.city || query;
          const country = p.country || '';
          const state = p.state || '';
          const cc = (p.countrycode || '').toUpperCase();
          return { name, nameZh: '', country: country || state, code: cc, lat: f.geometry?.coordinates?.[1], lon: f.geometry?.coordinates?.[0] };
        });
      const seen = new Set();
      const unique = cities.filter((c) => {
        const key = c.name + c.code;
        if (seen.has(key)) return false;
        seen.add(key);
        return true;
      });
      if (!unique.length) {
        box.innerHTML = `<div class="search-result-item"><span class="caption">${t('no_city')}</span></div>`;
        return;
      }
      box.innerHTML = unique.map((c, i) =>
        `<div class="search-result-item" data-idx="${i}">
          <div><strong>${esc(c.name)}</strong><br><span class="caption">${esc(c.country)} ${c.code ? '· ' + esc(c.code) : ''}</span></div>
        </div>`
      ).join('');
      box._results = unique;
      box.querySelectorAll('.search-result-item').forEach((el) => {
        el.addEventListener('click', () => {
          const c = box._results[+el.dataset.idx];
          if (c) {
            setDestination(c);
            $('city-search').value = c.name;
            box.classList.add('hidden');
          }
        });
      });
    } catch (e) {
      box.innerHTML = `<div class="search-result-item"><span class="caption">${t('search_fail')}</span></div>`;
    }
  }

  function esc(s) {
    const d = document.createElement('div');
    d.textContent = s || '';
    return d.innerHTML;
  }

  function getSlotCountForDay(mode) {
    const [min, max] = INTENSITY_SLOTS[mode] || [2, 3];
    return min + Math.floor(Math.random() * (max - min + 1));
  }

  const GENERIC_SUFFIXES = ['Historic Quarter', 'Central Market', 'Riverside Walk', 'Old Town Square', 'City Museum', 'Botanical Garden', 'Observation Deck', 'Art District', 'Waterfront Promenade', 'Local Food Street', 'Cathedral', 'Night Market', 'National Park Gate', 'Craft Village', 'Temple District'];

  function cityKey(name) {
    return (name || '').toLowerCase().trim();
  }

  function getPoolForCity(cityName, interests) {
    const key = cityKey(cityName);
    const aliases = {
      'new york city': 'new york', nyc: 'new york', '東京': 'tokyo', '东京': 'tokyo',
      'paris': 'paris', 'london': 'london', 'roma': 'rome', 'rom': 'rome'
    };
    const resolved = aliases[key] || key.split(',')[0].trim();
    let pool = ATTRACTION_DB[resolved];
    if (!pool) {
      pool = [];
      const base = cityName.split(',')[0].trim() || 'City';
      GENERIC_SUFFIXES.forEach((suffix, i) => {
        const cats = ['Historical', 'Museum', 'Nature', 'Food & Drink', 'Shopping', 'Photography'];
        pool.push({
          place: `${base} ${suffix}`,
          placeZh: `${base}${suffix}`,
          category: cats[i % cats.length],
          cost_est: 20 + (i * 15) % 120,
          duration_mins: 45 + (i * 17) % 90,
          tip: `Local highlight #${i + 1} — explore at your own pace`
        });
      });
      for (let g = 0; g < 25; g++) {
        pool.push({
          place: `${base} Discovery Point ${g + 1}`,
          placeZh: `${base}探索点 ${g + 1}`,
          category: ['Historical', 'Nature', 'Food & Drink', 'Museum', 'Shopping'][g % 5],
          cost_est: (g * 23) % 150,
          duration_mins: 50 + (g * 11) % 70,
          tip: `Unique stop ${g + 1} tailored for ${base}`
        });
      }
    }
    const interestMap = {
      history: ['Historical'], nature: ['Nature'], food: ['Food & Drink'],
      museums: ['Museum'], shopping: ['Shopping'], nightlife: ['Nightlife'],
      photography: ['Photography', 'Nature'], adventure: ['Adventure', 'Nature']
    };
    const preferred = new Set();
    (interests || []).forEach((i) => (interestMap[i] || []).forEach((c) => preferred.add(c)));
    const scored = pool.map((p) => ({
      ...p,
      score: preferred.size && preferred.has(p.category) ? 2 : 1
    }));
    scored.sort((a, b) => b.score - a.score);
    return scored;
  }

  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function makeTransport(mode, route, mins, cost, instructions) {
    const icons = { walking: '🚶', subway: '🚇', bus: '🚌', taxi: '🚕', train: '🚄' };
    return {
      mode, mode_icon: icons[mode] || '🚶', route,
      duration_mins: mins, cost_est: cost, instructions
    };
  }

  function pickTransport(budgetTier, distHint) {
    const modes = {
      economy: [['walking', 0], ['subway', 5], ['bus', 4]],
      comfort: [['subway', 6], ['bus', 5], ['taxi', 45]],
      luxury: [['taxi', 55], ['subway', 8], ['walking', 0]]
    };
    const list = modes[budgetTier] || modes.comfort;
    const [mode, baseCost] = list[Math.floor(Math.random() * list.length)];
    const mins = 5 + Math.floor(Math.random() * 25) + (distHint || 0);
    const routes = {
      walking: 'Walk via main street', subway: 'Metro line — 3 stops',
      bus: 'City bus route', taxi: 'Direct ride', train: 'Regional train'
    };
    return makeTransport(mode, routes[mode], mins, mode === 'walking' ? 0 : baseCost + mins, `Head to next stop · ~${mins} min`);
  }

  function buildItineraryFromPool(tripConfig) {
    const { startDate, durationDays, destination, interests, budgetTier, intensityMode } = tripConfig;
    const pool = shuffle(getPoolForCity(destination.name, interests));
    const globalUsed = new Set();
    const days = [];
    let poolIdx = 0;

    for (let d = 0; d < durationDays; d++) {
      const date = addDays(startDate, d);
      const slotCount = getSlotCountForDay(intensityMode);
      const slots = [];
      let hour = 9;
      let minute = 0;

      for (let s = 0; s < slotCount; s++) {
        let attraction = null;
        let attempts = 0;
        while (attempts < pool.length * 2) {
          const candidate = pool[poolIdx % pool.length];
          poolIdx++;
          attempts++;
          const key = candidate.place.toLowerCase();
          if (!globalUsed.has(key)) {
            globalUsed.add(key);
            attraction = candidate;
            break;
          }
        }
        if (!attraction) {
          attraction = {
            place: `${destination.name} Hidden Gem ${globalUsed.size + 1}`,
            placeZh: `秘境 ${globalUsed.size + 1}`,
            category: 'Nature',
            cost_est: 30,
            duration_mins: 60,
            tip: 'Off-the-beaten-path discovery'
          };
          globalUsed.add(attraction.place.toLowerCase());
        }

        const time = `${String(hour).padStart(2, '0')}:${String(minute).padStart(2, '0')}`;
        const isLast = s === slotCount - 1;
        slots.push({
          time,
          place: attraction.place,
          placeZh: attraction.placeZh,
          duration_mins: attraction.duration_mins,
          cost_est: attraction.cost_est,
          category: attraction.category,
          tip: attraction.tip,
          transport_to_next: isLast ? null : pickTransport(budgetTier)
        });

        const totalMins = attraction.duration_mins + (isLast ? 0 : (slots[slots.length - 1].transport_to_next?.duration_mins || 15));
        minute += totalMins;
        while (minute >= 60) { hour += Math.floor(minute / 60); minute %= 60; }
        if (hour >= 21) break;
      }

      days.push({
        date,
        dayLabel: `Day ${d + 1}`,
        slots
      });
    }

    return {
      city: destination.name,
      cityZh: destination.nameZh || destination.name,
      days
    };
  }

  function addDays(iso, n) {
    const d = new Date(iso);
    d.setDate(d.getDate() + n);
    return d.toISOString().slice(0, 10);
  }

  function dayHasMeal(slots, type) {
    return (slots || []).some((s) => {
      if (s.meal_type === type) return true;
      if (s.category !== 'Food & Drink' || !s.time) return false;
      if (type === 'lunch') return s.time >= '11:00' && s.time <= '14:30';
      return s.time >= '18:00' && s.time <= '21:30';
    });
  }

  function createMealSlot(type, city, cityZh, config) {
    const isLunch = type === 'lunch';
    const cost = config.budgetTier === 'luxury' ? 200 : config.budgetTier === 'comfort' ? 120 : 70;
    const mealLabel = isLunch ? t('meal_lunch') : t('meal_dinner');
    const dietaryNote = config.dietary !== 'none' ? ` (${config.dietary})` : '';
    return {
      time: isLunch ? '12:30' : '19:00',
      meal_type: type,
      place: appLang === 'zh'
        ? `${city} · ${mealLabel}${dietaryNote}`
        : t(isLunch ? 'lunch_default' : 'dinner_default', { city }),
      placeZh: appLang === 'zh' ? `${cityZh || city}${mealLabel}` : (cityZh || city),
      duration_mins: isLunch ? 75 : 90,
      cost_est: cost,
      category: 'Food & Drink',
      tip: (t(isLunch ? 'lunch_tip' : 'dinner_tip') + dietaryNote).trim(),
      transport_to_next: null
    };
  }

  function fixTransportsForDay(slots, budgetTier) {
    const sorted = [...slots].sort((a, b) => (a.time || '').localeCompare(b.time || ''));
    sorted.forEach((s, i) => {
      s.transport_to_next = i < sorted.length - 1 ? (s.transport_to_next || pickTransport(budgetTier)) : null;
    });
    return sorted;
  }

  function ensureMealsInItinerary(data, config) {
    if (!data?.days) return data;
    const city = data.city || config.destination.name;
    const cityZh = data.cityZh || config.destination.nameZh || city;
    data.days.forEach((day, di) => {
      let slots = [...(day.slots || [])];
      if (!dayHasMeal(slots, 'lunch')) slots.push(createMealSlot('lunch', city, cityZh, config));
      if (!dayHasMeal(slots, 'dinner')) slots.push(createMealSlot('dinner', city, cityZh, config));
      day.slots = fixTransportsForDay(slots, config.budgetTier);
    });
    return data;
  }

  async function callAIItinerary(tripConfig) {
    if (!apiKey || apiKey.length < 8) return null;
    const ep = AI_ENDPOINTS[apiProvider] || AI_ENDPOINTS.openai;
    const slotsRule = {
      casual: '1-2 sightseeing activities (excluding meals)',
      standard: '2-3 sightseeing activities (excluding meals)',
      blitz: '4-5 sightseeing activities (excluding meals)'
    };
    const langInstr = appLang === 'zh'
      ? 'Use Chinese for placeZh and tips; place can be bilingual "English · 中文".'
      : 'Use English for place; placeZh optional Chinese translation.';
    const prompt = `You are BlitzTrip routing AI for ANY city worldwide. Return ONLY valid JSON, no markdown.

DESTINATION: ${tripConfig.destination.name}, ${tripConfig.destination.country || ''} (${tripConfig.destination.code || ''})
DATES: ${tripConfig.startDate} to ${tripConfig.endDate} (${tripConfig.durationDays} days)
TRAVELERS: ${tripConfig.travelers}
INTERESTS: ${tripConfig.interests.join(', ')}
DIETARY: ${tripConfig.dietary}
INTENSITY: ${tripConfig.intensityMode} — ${slotsRule[tripConfig.intensityMode]}
BUDGET TIER: ${tripConfig.budgetTier}
LANGUAGE: ${appLang}
${langInstr}

MANDATORY RULES:
1. Each day MUST include exactly: lunch slot ~12:30 and dinner slot ~19:00 (category "Food & Drink", meal_type "lunch" or "dinner") at real local restaurants.
2. Plus ${slotsRule[tripConfig.intensityMode]} — unique attractions, NO duplicates across entire trip.
3. Schedule 9:00-21:00. Sort slots by time. Respect dietary restrictions for meals.
4. cost_est in HKD. Every slot except last of each day needs transport_to_next with mode, mode_icon, route, duration_mins, cost_est, instructions.
5. Use REAL venue names for the destination city (not generic placeholders).

JSON schema:
{"city":"","cityZh":"","days":[{"date":"YYYY-MM-DD","dayLabel":"Day 1","slots":[{"time":"HH:MM","place":"","placeZh":"","duration_mins":60,"cost_est":0,"category":"","meal_type":null,"tip":"","transport_to_next":{...}|null}]}]}`;

    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), API_TIMEOUT_MS);
    try {
      const res = await fetch(ep.url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${apiKey}` },
        signal: controller.signal,
        body: JSON.stringify({
          model: ep.model,
          messages: [
            { role: 'system', content: 'You output only valid JSON itineraries for any world city. Always include lunch and dinner.' },
            { role: 'user', content: prompt }
          ],
          temperature: 0.65,
          ...(apiProvider === 'openai' ? { response_format: { type: 'json_object' } } : {})
        })
      });
      clearTimeout(timeout);
      if (!res.ok) {
        const errBody = await res.text().catch(() => '');
        console.warn('AI API error', res.status, errBody);
        return null;
      }
      const data = await res.json();
      const text = data.choices?.[0]?.message?.content || '';
      const jsonMatch = text.match(/\{[\s\S]*\}/);
      if (!jsonMatch) return null;
      return JSON.parse(jsonMatch[0]);
    } catch (e) {
      clearTimeout(timeout);
      console.warn('AI call failed', e);
      return null;
    }
  }

  function dedupeItinerary(data) {
    if (!data?.days) return data;
    const used = new Set();
    data.days.forEach((day) => {
      day.slots = (day.slots || []).filter((slot) => {
        const key = (slot.place || '').toLowerCase();
        if (used.has(key)) return false;
        used.add(key);
        return true;
      });
    });
    return data;
  }

  async function generateItineraryWithTransport(config) {
    usedOfflineMode = false;
    usedAiMode = false;
    let result = null;
    if (apiKey && apiKey.length > 8) {
      $('loading-sub').textContent = appLang === 'zh'
        ? `正在通过 DeepSeek AI 为 ${config.destination.name} 生成行程…`
        : `Generating via DeepSeek AI for ${config.destination.name}…`;
      result = await callAIItinerary(config);
      if (result) usedAiMode = true;
    }
    if (!result) {
      result = buildItineraryFromPool(config);
      usedOfflineMode = true;
    }
    result = dedupeItinerary(result);
    return ensureMealsInItinerary(result, config);
  }

    });

    const foodPerDay = FOOD_PER_DAY[tp.intensity] || 250;
    const foodHKD = foodPerDay * tp.numDays;
    const transportHKD = roundToNearest10(attractionsHKD * 0.10);

    return { attractionsHKD, foodHKD, transportHKD, foodPerDay, dayBreakdowns, empty: false };
  }

  async function buildFullBudgetSummary() {
    const tp = getTripParams();
    const fixed = await estimateFixedCosts();
    const s2 = computeSection2FromItinerary();

    const flightsHKD = fixed.flights.hkd;
    const hotelHKD = fixed.hotel.hkd;
    const otherHKD = fixed.other.hkd;
    const section1TotalHKD = flightsHKD + hotelHKD + otherHKD;
    const section2TotalHKD = s2.attractionsHKD + s2.foodHKD + s2.transportHKD;
    const grandTotalHKD = section1TotalHKD + section2TotalHKD;

    let overBudget = false;
    let overBudgetAmountHKD = null;
    if (tp.budgetPerDay != null) {
      const userBudgetHKD = tp.budgetPerDay * tp.numDays;
      if (grandTotalHKD > userBudgetHKD) {
        overBudget = true;
        overBudgetAmountHKD = grandTotalHKD - userBudgetHKD;
      }
    }

    budgetSummary = {
      flights: convertHKDToDisplay(flightsHKD, tp.currency),
      hotel: convertHKDToDisplay(hotelHKD, tp.currency),
      other: convertHKDToDisplay(otherHKD, tp.currency),
      attractions: convertHKDToDisplay(s2.attractionsHKD, tp.currency),
      food: convertHKDToDisplay(s2.foodHKD, tp.currency),
      transport: convertHKDToDisplay(s2.transportHKD, tp.currency),
      section1Total: convertHKDToDisplay(section1TotalHKD, tp.currency),
      section2Total: convertHKDToDisplay(section2TotalHKD, tp.currency),
      grandTotal: convertHKDToDisplay(grandTotalHKD, tp.currency),
      flightsHKD, hotelHKD, otherHKD, section1TotalHKD, section2TotalHKD, grandTotalHKD,
      currency: tp.currency,
      overBudget,
      overBudgetAmountHKD,
      sourceLabels: {
        flights: fixed.flights.source,
        hotel: fixed.hotel.source,
        other: fixed.other.source
      },
      s2,
      fixed
    };
    return budgetSummary;
  }

  function renderBudgetSection1Results() {
    if (!fixedCostsDetail) return;
    const f = fixedCostsDetail;
    const row = (item, showBook) => `
      <div class="budget-fixed-row">
        <div>
          <div>${item.label}</div>
          ${item.tag ? `<span class="budget-tag ${item.tagClass || 'estimate'}">${item.tag}</span>` : ''}
        </div>
        ${showBook && item.bookUrl ? `<a href="${item.bookUrl}" target="_blank" rel="noopener" class="btn btn-secondary" style="font-size:14px;padding:0 var(--md)">🔍 ${appLang === 'zh' ? '在 Trip.com 预订 →' : 'Book on Trip.com →'}</a>` : ''}
      </div>`;
    $('budget-s1-results').innerHTML = `
      <h3>📋 ${appLang === 'zh' ? '固定费用' : 'Fixed Costs'}</h3>
      ${row(f.flights, true)}
      ${row(f.hotel, true)}
      ${row(f.other, false)}
      <p class="caption" style="margin-top:var(--md)">${appLang === 'zh' ? 'Section 1 小计：' : 'Section 1 subtotal: '}<strong>${fmtBudget(budgetSummary.section1TotalHKD)}</strong></p>`;
  }

  function renderBudgetSection2() {
    const tp = getTripParams();
    const s2 = budgetSummary?.s2 || computeSection2FromItinerary();
    if (s2.empty || !itineraryData?.days?.length) {
      $('budget-s2').innerHTML = `
        <h3>🗺️ ${appLang === 'zh' ? '行程费用明细' : 'Estimated Itinerary Costs'}</h3>
        <p class="caption">${appLang === 'zh' ? '暂无行程数据 — 请先生成行程' : 'No itinerary data — generate your trip first'}</p>`;
      return;
    }

    const daysHtml = s2.dayBreakdowns.map((d) => `
      <div class="budget-day-block">
        <h4 style="font-size:15px;margin-bottom:var(--sm)">${d.label}</h4>
        ${d.rows.map((r) => `
          <div class="budget-slot-row">
            <span style="min-width:48px;color:var(--primary-focus)">${esc(r.time)}</span>
            <span>${r.emoji}</span>
            <span style="flex:1">${esc(r.place)}${r.isLive ? ' <span class="live-slot-badge">🔴 LIVE</span>' : ''}</span>
            <span class="caption">${r.mins} ${t('min')}</span>
            <span>${r.costStr}</span>
          </div>`).join('')}
        <div class="budget-day-total">${appLang === 'zh' ? '当日小计' : 'Day total'}: ${fmtBudget(d.dayTotalHKD)}</div>
      </div>`).join('');

    const intensityLabel = tp.intensity.toUpperCase();
    $('budget-s2').innerHTML = `
      <h3>🗺️ ${appLang === 'zh' ? '行程费用明细' : 'Estimated Itinerary Costs'}</h3>
      ${daysHtml}
      <div class="budget-estimate-row">
        <div>🍜 ${appLang === 'zh' ? '餐饮估算' : 'Food estimate'}: <strong>${fmtBudget(s2.foodHKD)}</strong></div>
        <div class="caption">~ ${appLang === 'zh' ? 'AI 估算' : 'AI Estimate'} (${intensityLabel}: ${s2.foodPerDay} HKD/${appLang === 'zh' ? '天' : 'day'}, ${tp.numDays} ${appLang === 'zh' ? '天' : 'days'})</div>
      </div>
      <div class="budget-estimate-row">
        <div>🚇 ${appLang === 'zh' ? '交通估算' : 'Transport estimate'}: <strong>${fmtBudget(s2.transportHKD)}</strong></div>
        <div class="caption">~ ${appLang === 'zh' ? 'AI 估算（景点费用 10%）' : 'AI Estimate (10% of attractions total)'}</div>
      </div>
      <div class="budget-s2-subtotal">${appLang === 'zh' ? '行程 + 餐饮 + 交通：' : 'Itinerary + Food + Transport: '}<strong>${fmtBudget(budgetSummary?.section2TotalHKD ?? (s2.attractionsHKD + s2.foodHKD + s2.transportHKD))}</strong></div>
    `;
  }

  function renderBudgetGrandTotal() {
    if (!budgetSummary) return;
    const tp = getTripParams();
    const toggleLabel = budgetDisplayCurrency === 'HKD'
      ? (appLang === 'zh' ? '切换为 USD' : 'Switch to USD')
      : (appLang === 'zh' ? '切换为 HKD' : 'Switch to HKD');
  const overHtml = budgetSummary.overBudget && budgetSummary.overBudgetAmountHKD != null
      ? `<div class="budget-over-banner">⚠️ ${appLang === 'zh' ? '预估支出超出您的预算' : 'Estimated spend exceeds your budget'} ${fmtBudget(budgetSummary.overBudgetAmountHKD)}</div>`
      : '';

    $('budget-grand').classList.remove('hidden');
    $('budget-grand').innerHTML = `
      <div class="caption" style="color:var(--body-muted)">💰 ${appLang === 'zh' ? '预估总费用' : 'TOTAL ESTIMATED COST'}</div>
      <div class="grand-amount">${fmtBudget(budgetSummary.grandTotalHKD)}</div>
      <button type="button" class="btn btn-secondary" id="btn-currency-toggle">${toggleLabel} (1 USD = 7.8 HKD)</button>
      ${overHtml}`;
    $('btn-currency-toggle').onclick = () => {
      budgetDisplayCurrency = budgetDisplayCurrency === 'HKD' ? 'USD' : 'HKD';
      buildFullBudgetSummary().then(() => {
        renderBudgetSection1Results();
        renderBudgetSection2();
        renderBudgetGrandTotal();
      });
    };
  }

  function initBudgetModule() {
    budgetSection1Done = false;
    userKnownCosts = { flights: null, hotel: null, other: null };
    budgetDisplayCurrency = (appCurrency === 'USD') ? 'USD' : 'HKD';
    $('budget-s1-form').classList.remove('hidden');
    $('budget-s1-results').classList.add('hidden');
    $('budget-grand').classList.add('hidden');
    renderBudgetSection1Form();
    const s2 = computeSection2FromItinerary();
    budgetSummary = { s2 };
    renderBudgetSection2();
  }

  function renderResults() {
    if (!itineraryData || !tripConfig) return;
    $('offline-banner').textContent = t('offline_banner');
    $('offline-banner').classList.toggle('hidden', !usedOfflineMode);
    const aiBanner = $('ai-banner');
    if (aiBanner) {
      aiBanner.textContent = t('ai_banner');
      aiBanner.classList.toggle('hidden', !usedAiMode);
    }
    $('results-title').textContent = `${itineraryData.city} · ${t('your_trip')}`;
    $('results-subtitle').textContent = t('trip_days', {
      start: tripConfig.startDate, end: tripConfig.endDate,
      days: tripConfig.durationDays, n: tripConfig.travelers, mode: tripConfig.intensityMode.toUpperCase()
    });

    const panels = $('day-panels');
    const tabsHtml = itineraryData.days.map((day, i) =>
      `<button type="button" class="day-tab${i === activeDayIndex ? ' active' : ''}" data-day="${i}">${day.dayLabel}</button>`
    ).join('');
    panels.innerHTML = `<div class="day-tabs">${tabsHtml}</div>`;

    itineraryData.days.forEach((day, i) => {
      let transportMins = 0, transportCost = 0;
      const slotsHtml = day.slots.map((slot) => {
        if (slot.transport_to_next) {
          transportMins += slot.transport_to_next.duration_mins;
          transportCost += slot.transport_to_next.cost_est || 0;
        }
        const tr = slot.transport_to_next;
        const transportHtml = tr ? `
          <div class="transport-card">
            <div class="transport-mode">${tr.mode_icon} ${tr.duration_mins} ${t('min')} · ${tr.cost_est ? fmtMoney(tr.cost_est) : t('free')}</div>
            <div>${esc(tr.route)}</div>
            <div class="caption">${esc(tr.instructions)}</div>
          </div>` : '';
        const mealBadge = slot.meal_type ? `<span style="color:#ff9500;font-weight:600">🍽 ${t('meal_' + slot.meal_type)}</span> · ` : '';
        const isMeal = slot.meal_type || slot.category === 'Food & Drink';
        return `
          <div class="card slot-card${isMeal ? ' meal-slot' : ''}">
            <div class="slot-header">
              <span class="slot-time">${esc(slot.time)}</span>
              <div>
                <div class="slot-place">${mealBadge}${esc(placeLabel(slot))}</div>
                <div class="slot-meta">⏱️ ${slot.duration_mins} ${t('min')} | ${slot.cost_est ? fmtMoney(slot.cost_est) : t('free')} | ${esc(slot.category)}</div>
                <div class="slot-tip">💡 ${esc(slot.tip)}</div>
              </div>
            </div>
            ${transportHtml}
          </div>`;
      }).join('');

      panels.innerHTML += `
        <div class="day-panel${i === activeDayIndex ? '' : ' hidden'}" data-panel="${i}">
          <h3 style="margin-bottom:var(--md)">${day.dayLabel} — ${day.date}</h3>
          ${slotsHtml}
          <div class="transport-summary card">
            <strong>${t('transport_day')}</strong> · ${transportMins} ${t('min')} · ${fmtMoney(transportCost)}
          </div>
        </div>`;
    });

    panels.querySelectorAll('.day-tab').forEach((tab) => {
      tab.addEventListener('click', () => {
        activeDayIndex = +tab.dataset.day;
        panels.querySelectorAll('.day-tab').forEach((t) => t.classList.toggle('active', +t.dataset.day === activeDayIndex));
        panels.querySelectorAll('.day-panel').forEach((p) => p.classList.toggle('hidden', +p.dataset.panel !== activeDayIndex));
      });
    });

    let allMins = 0, allCost = 0;
    itineraryData.days.forEach((day) => day.slots.forEach((s) => {
      if (s.transport_to_next) { allMins += s.transport_to_next.duration_mins; allCost += s.transport_to_next.cost_est || 0; }
    }));
    $('transport-summary-all').innerHTML = `<strong>${t('transport_all')}</strong> · ${allMins} ${t('min')} · ${fmtMoney(allCost)}<br><span class="caption">${t('transport_tip')}</span>`;

    initBudgetModule();
  }

  async function runGeneration() {
    const { valid, days, start, end } = parseDates();
    if (!valid || !selectedDestination) return;

    tripConfig = {
      startDate: start,
      endDate: end,
      durationDays: days,
      travelers,
      destination: selectedDestination,
      interests: [...selectedInterests],
      dietary: $('dietary').value,
      budgetTier: $('budget-tier').value,
      intensityMode: selectedIntensity,
      lang: appLang,
      currency: appCurrency
    };

    showView('loading-view');
    document.querySelector('#loading-view h2').textContent = t('loading_title');
    $('loading-sub').textContent = t('loading_sub');
    try {
      itineraryData = await generateItineraryWithTransport(tripConfig);
      activeDayIndex = 0;
      renderResults();
      showView('results-view');
    } catch (e) {
      alert(t('gen_fail') + (e.message || ''));
      showView('wizard-view');
    }
  }

  function buildTripConfigFromForm() {
    return tripConfig;
  }

  function initUI() {
    const today = new Date().toISOString().slice(0, 10);
    const nextWeek = addDays(today, 7);
    const twoWeeks = addDays(today, 9);
    $('start-date').value = nextWeek;
    $('end-date').value = twoWeeks;
    $('start-date').min = today;

    $('hot-destinations').innerHTML = HOT_CITIES.map((c) =>
      `<button type="button" class="chip" data-city="${esc(c.name)}">${c.name}${c.nameZh ? ' ' + c.nameZh : ''}</button>`
    ).join('');
    document.querySelectorAll('#hot-destinations .chip').forEach((chip) => {
      chip.addEventListener('click', () => {
        const c = HOT_CITIES.find((x) => x.name === chip.dataset.city);
        if (c) { setDestination(c); $('city-search').value = c.name; }
      });
    });

    renderInterestChips();
    renderIntensityCards();
    renderDietaryBudget();
    loadPrefs();
    applyI18n();
  }

  $('btn-start').addEventListener('click', () => { showView('wizard-view'); loadDraft(); });
  $('btn-back-cover').addEventListener('click', () => showView('cover-view'));
  $('btn-back').addEventListener('click', () => goToStep(currentStep - 1, false));
  $('btn-next').addEventListener('click', () => {
    if (currentStep < 4) goToStep(currentStep + 1);
    else if (validateStep(4)) runGeneration();
  });
  $('start-date').addEventListener('change', () => { updateDuration(); $('end-date').min = $('start-date').value; saveDraft(); });
  $('end-date').addEventListener('change', () => { updateDuration(); saveDraft(); });
  $('travelers-minus').addEventListener('click', () => { if (travelers > 1) { travelers--; $('travelers-count').textContent = travelers; saveDraft(); } });
  $('travelers-plus').addEventListener('click', () => { if (travelers < 8) { travelers++; $('travelers-count').textContent = travelers; saveDraft(); } });
  $('city-search').addEventListener('input', (e) => {
    clearTimeout(searchDebounce);
    searchDebounce = setTimeout(() => searchCities(e.target.value.trim()), 300);
  });
  $('clear-dest').addEventListener('click', () => {
    selectedDestination = null;
    $('selected-dest').classList.add('hidden');
    $('city-search').value = '';
    document.querySelectorAll('.chip[data-city]').forEach((c) => c.classList.remove('selected'));
    saveDraft();
  });
  $('btn-new-trip').addEventListener('click', () => {
    budgetSection1Done = false;
    userKnownCosts = { flights: null, hotel: null, other: null };
    showView('wizard-view');
    goToStep(1, false);
  });
  $('btn-regenerate').addEventListener('click', () => runGeneration());
  $('btn-export').addEventListener('click', () => window.print());
  $('lang-select').addEventListener('change', (e) => {
    appLang = e.target.value;
    saveDraft();
    applyI18n();
  });
  $('currency-select').addEventListener('change', (e) => {
    appCurrency = e.target.value;
    budgetDisplayCurrency = (appCurrency === 'USD') ? 'USD' : 'HKD';
    saveDraft();
    renderDietaryBudget();
    if (itineraryData) {
      renderResults();
      if (budgetSection1Done && budgetSummary) {
        buildFullBudgetSummary().then(() => {
          renderBudgetSection1Results();
          renderBudgetSection2();
          renderBudgetGrandTotal();
        });
      }
    }
  });
  initUI();
  updateDuration();
  showView('cover-view');
})();
</script>
</body>
</html>
